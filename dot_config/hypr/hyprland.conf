# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
    smart_split = true
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    font_family = Roboto Nerd Font
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = fr,us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more

bind = SUPER, A, exec, $browser
bind = SUPER+SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy
bind = , Print, exec, grim -o "DP-2" - | wl-copy
bind = SUPER+SHIFT, O, exec, grim -g "$(slurp)" - | tesseract - - | wl-copy
bind = SUPER, M, exec, hyprpicker | wl-copy
bind = SUPER, S, exec, $spotify
bind = SUPER, S, focuswindow, class:Spotify
bind = SUPER, D, exec, $discord
bind = SUPER, D, focuswindow, class:discord
bind = SUPER, Q, exec, $terminal
bind = SUPER, C, killactive,
bind = SUPER, mouse:274, killactive,
bind = SUPER, E, exec, $fileManager
bind = SUPER, V, exec, code
bind = SUPER, F, togglefloating,
# bind = SUPER, P, pseudo, # dwindle
bind = SUPER, J, layoutmsg, togglesplit # dwindle
bind = SUPER, TAB, fullscreen
bind = SUPER, O, exec, $obsidian

#ROFI
bind = SUPER, R, exec, rofi -show run
bind = SUPER, SPACE, exec, rofi -show drun -show-icons
bind = SUPER, SEMICOLON, exec, $localbin/clipmenu
bind = SUPER+SHIFT, C, exec, rofi -show calc -modi calc -no-sort
bind = SUPER+SHIFT, E, exec, rofi -modi emoji -show emoji
bind = SUPER+SHIFT, P, exec, rofi -show power-menu -modi power-menu:$localbin/rofi-power-menu

# Move focus with mainMod + arrow keys
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

bind = SUPER, h, movefocus, l
bind = SUPER, l, movefocus, r
bind = SUPER, k, movefocus, u
bind = SUPER, j, movefocus, d

# Move windows with mainMod + shift + arrow keys
bind = SUPER+SHIFT, left, movewindow, l
bind = SUPER+SHIFT, right, movewindow, r
bind = SUPER+SHIFT, up, movewindow, u
bind = SUPER+SHIFT, down, movewindow, d

bind = SUPER+SHIFT, h, movewindow, l
bind = SUPER+SHIFT, l, movewindow, r
bind = SUPER+SHIFT, k, movewindow, u
bind = SUPER+SHIFT, j, movewindow, d

# Switch workspaces with mainMod + [0-9]
bind = SUPER, ampersand, workspace, 1
bind = SUPER, eacute, workspace, 2
bind = SUPER, quotedbl, workspace, 3
bind = SUPER, apostrophe, workspace, 4
bind = SUPER, parenleft, workspace, 5
bind = SUPER, minus, workspace, 6
bind = SUPER, egrave, workspace, 7
bind = SUPER, underscore, workspace, 8
bind = SUPER, ccedilla, workspace, 9
bind = SUPER, agrave, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = SUPER+SHIFT, ampersand, movetoworkspacesilent, 1
bind = SUPER+SHIFT, eacute, movetoworkspacesilent, 2
bind = SUPER+SHIFT, quotedbl, movetoworkspacesilent, 3
bind = SUPER+SHIFT, apostrophe, movetoworkspacesilent, 4
bind = SUPER+SHIFT, parenleft, movetoworkspacesilent, 5
bind = SUPER+SHIFT, minus, movetoworkspacesilent, 6
bind = SUPER+SHIFT, egrave, movetoworkspacesilent, 7
bind = SUPER+SHIFT, underscore, movetoworkspacesilent, 8
bind = SUPER+SHIFT, ccedilla, movetoworkspacesilent, 9
bind = SUPER+SHIFT, agrave, movetoworkspacesilent, 10

# Example special workspace (scratchpad)
# bind = SUPER, S, togglespecialworkspace, magic
# bind = SUPER SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

